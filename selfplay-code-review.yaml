runtime: mock
threshold: 0.7
database: data/selfplay-code-review.sqlite
cycles: 1

evaluation:
  profiles:
    code-review:
      id: code-review
      version: 1
      dimensions:
        - id: type_hints
          label: "有类型标注"
          pattern: "(->|:\\s*(int|str|float|bool|list|dict|Any|None|str\\s*\\|))"
          weight: 0.14
        - id: docstrings
          label: "有 docstring"
          pattern: '"""'
          weight: 0.12
        - id: error_handling
          label: "有错误处理"
          keywords: ["try", "except", "raise"]
          weight: 0.14
        - id: logging
          label: "有日志记录"
          keywords: ["logging", "logger", "log."]
          weight: 0.08
        - id: type_safety
          label: "有类型检查"
          keywords: ["isinstance", "TypeError", "ValueError", "AttributeError"]
          weight: 0.10
        - id: doc_params
          label: "有参数文档"
          pattern: "(:param|:type|Args:)"
          weight: 0.10
        - id: test_markers
          label: "有测试断言"
          keywords: ["assert", "test_", "mock", "pytest"]
          weight: 0.10
        - id: comments
          label: "有代码注释"
          pattern: "#\\s*\\w"
          weight: 0.08
        - id: complexity_control
          label: "函数不过长"
          type: length
          min_length: 20
          weight: 0.06
        - id: return_annotations
          label: "有返回标注"
          pattern: "->"
          weight: 0.08
